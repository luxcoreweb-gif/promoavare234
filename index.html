<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#C9922A">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Avaré Promoções">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="avare.png">
    <link rel="icon" type="image/png" href="avare.png">
    <title>Avaré Promoções</title>
    <link rel="stylesheet" href="membro.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

<div class="app">

    <nav class="nav-sidebar" id="navSidebar">
        <div class="nav-header">
            <img src="avare.png" alt="Avaré Promoções" class="nav-logo">
        </div>
        <div class="nav-section-label">Menu</div>
        <div class="nav-links">
            <button class="nav-link active" data-page="home">
                <span class="nav-link-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-5v-7H9v7H5a2 2 0 0 1-2-2z" /></svg></span>
                <span>Início</span>
            </button>
        </div>
        <div class="nav-spacer"></div>
        <div class="nav-bottom">
            <button class="nav-link google-login-btn" id="googleLoginBtn">
                <span class="nav-link-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M5 20v-2a7 7 0 0 1 14 0v2"/></svg></span>
                <span>Acesso Admin</span>
            </button>
            <button class="nav-link install-app-btn" id="installAppBtn">
                <span class="nav-link-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v8m0 0-3-3m3 3 3-3M5 15v4a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-4" /><path d="M8 19h8" /></svg></span>
                <span>Adicionar à tela inicial</span>
            </button>
            <div class="nav-brand-footer"><span>Avaré Promoções</span></div>
        </div>
    </nav>

    <div class="mobile-overlay" id="mobileOverlay"></div>

    <main class="main-content">

        <header class="main-header">
            <button class="menu-button" id="menuButton" aria-label="Menu">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6" /><line x1="3" y1="12" x2="21" y2="12" /><line x1="3" y1="18" x2="21" y2="18" /></svg>
            </button>
            <div class="header-center">
                <div class="header-logo"><img src="avare.png" alt="Avaré Promoções"></div>
            </div>
            <div class="header-right">
                <button class="search-button" id="refreshButton" aria-label="Atualizar Página">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6" /><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" /></svg>
                </button>
            </div>
        </header>

        <div class="search-sidebar-overlay" id="searchSidebarOverlay"></div>
        <div class="search-sidebar" id="searchSidebar">
            <div class="search-sidebar-header">
                <h3>Busca Empresa</h3>
                <button class="close-search-sidebar" id="closeSearchSidebar"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg></button>
            </div>
            <div class="search-sidebar-input">
                <div class="sidebar-search-field">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></svg>
                    <input type="text" id="sidebarSearchInput" placeholder="Digite o nome da empresa..." autocomplete="off">
                    <button id="sidebarClearSearchBtn" class="sidebar-clear-search"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg></button>
                </div>
            </div>
            <div class="search-sidebar-results" id="searchSidebarResults"><div class="search-sidebar-empty">Digite para buscar estabelecimentos</div></div>
        </div>

        <div class="content-wrapper">
            <div class="view active" id="homeView">
                <div class="category-search-wrapper">
                    <div class="category-search-field">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></svg>
                        <input type="text" id="categorySearchInput" placeholder="PESQUISAR CATEGORIA" autocomplete="off">
                    </div>
                </div>
                <div class="categories-grid" id="categoriesGrid"><div class="loading"><div class="loading-ring"></div><span>Carregando categorias...</span></div></div>
            </div>
        </div>
    </main>
</div>

<div class="fullscreen" id="categoryFullscreen">
    <div class="fullscreen-header">
        <button class="fullscreen-back" id="closeFullscreen"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg></button>
        <button class="fullscreen-search-btn" id="fullscreenSearchBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></svg>
        </button>
    </div>
    <div class="fullscreen-hero"><img src="avare.png" alt="Avaré Promoções"></div>
    
    <!-- BARRA DE PESQUISA DENTRO DA CATEGORIA -->
    <div class="category-search-wrapper inside-category" id="categorySearchWrapper">
        <div class="category-search-field">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></svg>
            <input type="text" id="establishmentSearchInput" placeholder="PESQUISAR EMPRESA" autocomplete="off">
            <button id="clearEstablishmentSearch" class="sidebar-clear-search"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg></button>
        </div>
    </div>
    
    <div class="fullscreen-scroll-container"><div class="fullscreen-content" id="fullscreenContent"></div></div>
    
    <div class="fullscreen-footer-dots" id="fullscreenFooterDots">
        <div class="dots-container" id="dotsContainer"></div>
    </div>
    
    <button class="est-nav-btn est-nav-prev" id="prevEstablishmentDesktop"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6" /></svg></button>
    <button class="est-nav-btn est-nav-next" id="nextEstablishmentDesktop"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6" /></svg></button>
</div>

<script type="module" src="membro.js"></script>
</body>
</html>
